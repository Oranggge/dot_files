;==========================================================
;   Polybar — Gruvbox Dark Hard, minimal
;   Matches nvim (gruvbox) + tmux (minimal) aesthetic
;==========================================================

[colors]
background     = #1d2021
background-alt = #3c3836
foreground     = #ebdbb2
primary        = #fabd2f
secondary      = #8ec07c
alert          = #fb4934
disabled       = #928374

[bar/main]
width  = 100%
height = 32pt
radius = 0

background = ${colors.background}
foreground = ${colors.foreground}

line-size = 2pt

border-size  = 0
border-color = #00000000

padding-left  = 1
padding-right = 1

module-margin = 0

separator = "  "

font-0 = JetBrainsMono Nerd Font:size=12;3
font-1 = JetBrainsMono Nerd Font:size=14;3

modules-left   = xworkspaces
modules-center = date
modules-right  = cpu memory headphones pulseaudio wlan vpn battery

cursor-click  = pointer
cursor-scroll = ns-resize

enable-ipc  = true
wm-restack  = i3

[module/xworkspaces]
type = internal/xworkspaces

label-active            = %name%
label-active-foreground = ${colors.background}
label-active-background = ${colors.primary}
label-active-padding    = 1

label-occupied         = %name%
label-occupied-padding = 1

label-urgent            = %name%
label-urgent-background = ${colors.alert}
label-urgent-padding    = 1

label-empty            = %name%
label-empty-foreground = ${colors.disabled}
label-empty-padding    = 1

[module/pulseaudio]
type = internal/pulseaudio

format-volume        = <label-volume>
label-volume       =  %percentage%%
label-volume-foreground = ${colors.secondary}

label-muted        =  muted
label-muted-foreground = ${colors.disabled}

click-right = pavucontrol &

[network-base]
type     = internal/network
interval = 5

[module/wlan]
inherit        = network-base
interface-type = wireless

format-connected         = <label-connected>
label-connected    =   %local_ip%     %downspeed:6%     %upspeed:6%
label-connected-foreground = ${colors.secondary}

format-disconnected      = <label-disconnected>
label-disconnected =  offline
label-disconnected-foreground = ${colors.disabled}

[module/battery]
type = internal/battery

full-at      = 99
low-at       = 10
battery      = BAT0
adapter      = AC
poll-interval = 5

format-charging         = <label-charging>
label-charging     =  %percentage%%
label-charging-foreground = ${colors.secondary}

format-discharging      = <label-discharging>
label-discharging  =  %percentage%%
label-discharging-foreground = ${colors.foreground}

format-full             = <label-full>
label-full         =  full
label-full-foreground   = ${colors.secondary}

format-low              = <label-low>
label-low          =  %percentage%%
label-low-foreground    = ${colors.alert}


[module/cpu]
type     = internal/cpu
interval = 2
warn-percentage = 80

format        = <label>
label         =  %percentage:2%%
label-foreground = ${colors.foreground}

format-warn        = <label-warn>
label-warn         =  %percentage:2%%
label-warn-foreground = ${colors.alert}

[module/memory]
type     = internal/memory
interval = 2
warn-percentage = 80

format        = <label>
label         =  %percentage_used:2%%
label-foreground = ${colors.foreground}

format-warn        = <label-warn>
label-warn         =  %percentage_used:2%%
label-warn-foreground = ${colors.alert}

[module/date]
type     = internal/date
interval = 1

date     = %a %b %d  %H:%M:%S
date-alt = %Y-%m-%d %H:%M:%S

label             = %date%
label-foreground  = ${colors.primary}

[module/systray]
type = internal/tray

format-background = ${colors.background}
tray-spacing      = 8pt

[module/vpn]
type     = custom/script
exec     = ~/.config/polybar/vpn.sh
interval = 1
click-left  = /home/fedouser/.config/polybar/vpn-menu.sh
click-right = /home/fedouser/.config/polybar/vpn-toggle.sh down

[module/headphones]
type     = custom/script
exec     = ~/.config/polybar/headphones.sh
interval = 5
click-left = ~/.local/bin/rofi-bt

[settings]
screenchange-reload = true
pseudo-transparency = true

; vim:ft=dosini
