;==========================================================
;   Polybar — Gruvbox Dark Hard, minimal
;   Matches nvim (gruvbox) + tmux (minimal) aesthetic
;==========================================================

[colors]
background     = #1d2021
background-alt = #3c3836
foreground     = #ebdbb2
primary        = #fabd2f
secondary      = #8ec07c
alert          = #fb4934
disabled       = #928374

[bar/main]
width  = 100%
height = 32pt
radius = 0

background = ${colors.background}
foreground = ${colors.foreground}

line-size = 2pt

border-size  = 0
border-color = #00000000

padding-left  = 1
padding-right = 1

module-margin = 0

separator = "  "

font-0 = JetBrainsMono Nerd Font:size=12;3
font-1 = JetBrainsMono Nerd Font:size=14;3

modules-left   = xworkspaces
modules-center = date
modules-right  = usage psi load ram disk temp headphones pulseaudio net vpn battery

cursor-click  = pointer
cursor-scroll = ns-resize

enable-ipc  = true
wm-restack  = i3

[module/xworkspaces]
type = internal/xworkspaces

label-active            = %name%
label-active-foreground = ${colors.background}
label-active-background = ${colors.primary}
label-active-padding    = 1

label-occupied         = %name%
label-occupied-padding = 1

label-urgent            = %name%
label-urgent-background = ${colors.alert}
label-urgent-padding    = 1

label-empty            = %name%
label-empty-foreground = ${colors.disabled}
label-empty-padding    = 1

[module/pulseaudio]
type = internal/pulseaudio

format-volume        = <label-volume>
label-volume       =  %percentage%%
label-volume-foreground = ${colors.secondary}

label-muted        =  muted
label-muted-foreground = ${colors.disabled}

; left-click is hardwired to mute by internal/pulseaudio; right-click is free.
; rofi-audio offers Output / Input / Mixer (pavucontrol) in one menu.
click-right = ~/.local/bin/rofi-audio

[module/net]
type     = custom/script
exec     = ~/.config/polybar/net.sh
tail     = true
; net.sh runs as a continuous tail loop (polls every 0.25s) so the click
; toggle between IP and down/up speed is instant — no interval wait.
click-left = ~/.config/polybar/net.sh toggle

[module/battery]
type = internal/battery

full-at      = 99
low-at       = 10
battery      = BAT0
adapter      = AC
poll-interval = 5

format-charging         = <label-charging>
label-charging     =  %percentage%%
label-charging-foreground = ${colors.secondary}

format-discharging      = <label-discharging>
label-discharging  =  %percentage%%
label-discharging-foreground = ${colors.foreground}

format-full             = <label-full>
label-full         =  full
label-full-foreground   = ${colors.secondary}

format-low              = <label-low>
label-low          =  %percentage%%
label-low-foreground    = ${colors.alert}


; --- System health ---------------------------------------------------
; Old `cpu` / `memory` modules were ambient-noise: red >80% just means
; the box is busy, not that anything needs your attention. Replaced
; with PSI-based + load/disk/temp modules that surface actual stalls.
;
;   psi    — hidden when fine; fires on real IO/MEM/CPU stalls (avg60)
;   load   — load5/cores ratio: <0.7 fg, 0.7-1.0 yellow, >=1.0 red
;   disk   — / used %:        <70 fg, 70-90  yellow, >=90  red
;   temp   — x86_pkg_temp °C: <75 fg, 75-85  yellow, >=85  red

[module/usage]
; Claude Code + Codex usage (binding weekly %, reset countdown, 5h window).
; The 5s interval is free: the script reads one cached file and formats it. All
; network polling happens in usage-panel.service, never on the bar's thread.
; Colours come from the script (gruvbox, same ladder as disk.sh).
;   repo: ~/gits/usage-panel   status: usage-panel/install.sh --check
type     = custom/script
exec     = ~/.config/polybar/usage-panel-bar
interval = 5

[module/psi]
type     = custom/script
exec     = ~/.config/polybar/psi.sh
interval = 5

[module/load]
type     = custom/script
exec     = ~/.config/polybar/load.sh
interval = 5

[module/ram]
type     = custom/script
exec     = ~/.config/polybar/ram.sh
interval = 5

[module/disk]
type     = custom/script
exec     = ~/.config/polybar/disk.sh
interval = 60

[module/temp]
type     = custom/script
exec     = ~/.config/polybar/temp.sh
interval = 5

[module/date]
type     = internal/date
interval = 1

date     = %a %b %d  %H:%M:%S
date-alt = %Y-%m-%d %H:%M:%S

label             = %date%
label-foreground  = ${colors.primary}

[module/systray]
type = internal/tray

format-background = ${colors.background}
tray-spacing      = 8pt

[module/vpn]
type     = custom/script
exec     = ~/.config/polybar/vpn.sh
interval = 1
click-left  = /home/fedouser/.config/polybar/vpn-menu.sh
click-right = /home/fedouser/.config/polybar/vpn-toggle.sh down

[module/headphones]
type     = custom/script
exec     = ~/.config/polybar/headphones.sh
interval = 5
click-left = ~/.local/bin/rofi-bt

[settings]
screenchange-reload = true
pseudo-transparency = true

; vim:ft=dosini
