# systemd-logind drop-in for laptop lid behavior.
#
# logind already detects "more than one display connected" via /sys/class/drm/*/status
# and applies HandleLidSwitchDocked= in that case (per logind.conf(5)). The default
# is "ignore", which is why the previous inhibitor approach was needed — and why it
# also broke battery suspend.
#
# Behavior matrix:
#   - lid close + ≥2 displays connected (docked or just plugged HDMI) → lock screen, no suspend
#   - lid close + AC plugged, only laptop screen          → suspend (charging in a bag is fine)
#   - lid close + battery, only laptop screen             → suspend (xss-lock locks first)
#
# xss-lock catches both LockSession (from action=lock) and PrepareForSleep (from suspend),
# so lock.sh runs in every case.
#
# To apply: sudo systemctl reload systemd-logind

[Login]
HandleLidSwitchDocked=lock
