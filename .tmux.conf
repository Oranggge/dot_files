# remap prefix from 'C-b' to 'C-a'
unbind C-b
set-option -g prefix C-a
bind-key C-a send-prefix

# vi mode
setw -g mode-keys vi

# vi-style selection in copy mode
bind-key -T copy-mode-vi v send-keys -X begin-selection
bind-key -T copy-mode-vi V send-keys -X select-line
bind-key -T copy-mode-vi y send-keys -X copy-pipe-and-cancel 'xclip -in -selection clipboard'

# mouse
set -g mouse on

# don't exit copy mode on mouse drag end (prevents snap-to-bottom)
unbind -T copy-mode-vi MouseDragEnd1Pane
unbind -T copy-mode MouseDragEnd1Pane

# scroll 1 line per wheel tick for smoother feel (default is 5)
bind -T copy-mode-vi WheelUpPane send-keys -X -N 1 scroll-up
bind -T copy-mode-vi WheelDownPane send-keys -X -N 1 scroll-down
bind -T copy-mode WheelUpPane send-keys -X -N 1 scroll-up
bind -T copy-mode WheelDownPane send-keys -X -N 1 scroll-down

# intuitive split bindings
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"

# new windows inherit current path
bind c new-window -c "#{pane_current_path}"

# pane resize with vim keys (repeatable)
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# repeat time for repeatable bindings
set -g repeat-time 1000

# window numbering
set -g base-index 1
set-window-option -g pane-base-index 1
set -g renumber-windows on

# scrollback
set -g history-limit 50000

# terminal / color
set-option -g default-terminal 'tmux-256color'
# Let tmux request/forward modified keys (Shift+Enter, Ctrl+Enter, etc.) from Ghostty.
# Pi then receives CSI-u sequences when apps request extended key reporting.
set-option -sa terminal-features ',xterm-ghostty:extkeys'
set-option -sa terminal-overrides ',xterm-ghostty:RGB'
set-option -sa terminal-overrides ',xterm-256color:RGB'

# undercurl support (for nvim diagnostics)
set-option -sa terminal-overrides ',*:Smulx=\E[4::%p1%dm'
set-option -sa terminal-overrides ',*:Setulc=\E[58::2::%p1%{65536}%/%d::%p1%{256}%/%{255}%&%d::%p1%{255}%&%d%;m'

# recommended from nvim
set-option -sg escape-time 10
set-option -g focus-events on

# allow passthrough (for notifications, images, etc.)
set -g allow-passthrough on
set -g bell-action any
set -g monitor-bell on

# gruvbox-inspired status bar
set -g status-style bg='#282828',fg='#ebdbb2'
set -g status-left '#[bg=#458588,fg=#282828,bold] #S #[bg=#282828] '
set -g status-left-length 20
set -g status-right '#[bg=#282828,fg=#a89984]#[bg=#a89984,fg=#282828] %H:%M '
set -g status-right-length 20

# redraw the status bar every second so the Claude "working" spinner below
# updates promptly (default is 15s). Cheap here — no #() shell calls in status.
set -g status-interval 1

# window status (with [Z] zoom marker on active zoomed pane)
#
# Claude "working" spinner: if a window's active pane is running `claude` AND its
# pane title is NOT the idle "✳ …" marker (i.e. Claude is actively thinking),
# prepend an animated blue spinner so you can see at a glance which tabs Claude
# is working in. The motion comes from tmux/claude-spinner.sh (launched below),
# which advances the global @cc_spin_frame option ~8fps; if that daemon isn't
# running we fall back to #{=1:pane_title} (Claude's own live but tiny braille
# frame). The predicate is inlined in both formats (tmux has no format vars).
# Composes with tmux-agent-indicator, which only touches window-status-*-style
# (colours), not these *-format templates; the two never collide (spinner =
# working; the plugin's orange/red = needs-input/done, which fire after Claude
# stops).
set -g window-status-format '#[fg=#a89984] #{?#{&&:#{==:claude,#{pane_current_command}},#{?#{m:✳*,#{pane_title}},0,1}},#[fg=#83a598]#{?#{@cc_spin_frame},#{@cc_spin_frame},#{=1:pane_title}} #[fg=#a89984],}#I:#W#{?window_last_flag,-,}#{?window_zoomed_flag, [Z],} '
set -g window-status-current-format '#[bg=#504945,fg=#fabd2f,bold] #{?#{&&:#{==:claude,#{pane_current_command}},#{?#{m:✳*,#{pane_title}},0,1}},#[fg=#83a598]#{?#{@cc_spin_frame},#{@cc_spin_frame},#{=1:pane_title}} #[fg=#fabd2f],}#I:#W#{?window_last_flag,-,}#{?window_zoomed_flag, [Z],} '
set -g window-status-separator ''

# pane borders
set -g pane-border-style fg='#504945'
set -g pane-active-border-style fg='#fabd2f'

# message style
set -g message-style bg='#458588',fg='#ebdbb2'

# Smart pane switching with awareness of Vim splits.
# See: https://github.com/christoomey/vim-tmux-navigator
is_vim="ps -o state= -o comm= -t '#{pane_tty}' \
    | grep -iqE '^[^TXZ ]+ +(\\S+\\/)?g?(view|n?vim?x?)(diff)?$'"
bind-key -n 'C-h' if-shell "$is_vim" 'send-keys C-h'  'select-pane -L'
bind-key -n 'C-j' if-shell "$is_vim" 'send-keys C-j'  'select-pane -D'
bind-key -n 'C-k' if-shell "$is_vim" 'send-keys C-k'  'select-pane -U'
bind-key -n 'C-l' if-shell "$is_vim" 'send-keys C-l'  'select-pane -R'
bind-key -n 'C-\' if-shell "$is_vim" 'send-keys C-\\'  'select-pane -l'

bind-key -T copy-mode-vi 'C-h' select-pane -L
bind-key -T copy-mode-vi 'C-j' select-pane -D
bind-key -T copy-mode-vi 'C-k' select-pane -U
bind-key -T copy-mode-vi 'C-l' select-pane -R
bind-key -T copy-mode-vi 'C-\' select-pane -l

# --- copy-mode scroll UX (2026-04-18) -------------------------------------
# Use case: scanning scrollback visually, not searching. Default tmux jumps
# 5 lines per wheel tick which feels rapid-snap rather than continuous.
# Fix: azorng/tmux-smooth-scroll (manual install at
# ~/.tmux/plugins/tmux-smooth-scroll, no TPM) rebinds wheel + Ctrl-U/D +
# PgUp/Dn in copy mode to a perl animator with easing.
#
# Tunings chosen after trying each:
#   speed  40    lower = faster. 100 (default) felt sluggish; 20 too blurry.
#   easing sine  ease-in-out feels most natural. linear is mechanical, quad
#                starts slow and ends abruptly (felt "strange").
#   normal 1     lines per wheel tick. 3 felt crumpy because each tick
#                animated a 3-line chunk — with 1 the tick-to-tick flow is
#                continuous. Keyboard Ctrl-D/U still animates half/full page.
#
# Ghostty note: inside tmux, wheel events travel as the mouse protocol
# (discrete ticks), so no terminal-side smoothing can interpolate between
# ticks. Smoothness is bounded by the wheel's hardware tick rate.
#
# j-exit-at-bottom: Ctrl-D naturally cancels copy mode when it hits the
# live buffer bottom, but `j` (cursor-down) just stops dead. The binding
# below checks scroll_position=0 AND cursor on the last row; if so, cancel,
# else cursor-down. Matches the Ctrl-D feel without affecting k/G.
# --------------------------------------------------------------------------

# keep cursor vertically centered in copy mode — j/k scroll the view with
# the cursor, mimicking nvim scrolloff=999. scroll-down/up no-op at the
# scrollback edges, so behavior degrades cleanly there.
bind -T copy-mode-vi j if-shell -F "#{&&:#{==:#{scroll_position},0},#{==:#{copy_cursor_y},#{e|-:#{pane_height},1}}}" "send-keys -X cancel" "send-keys -X cursor-down ; send-keys -X scroll-down"
bind -T copy-mode-vi k send-keys -X cursor-up \; send-keys -X scroll-up

set -g @smooth-scroll-speed "40"
set -g @smooth-scroll-easing "sine"
set -g @smooth-scroll-normal "1"
run-shell ~/.tmux/plugins/tmux-smooth-scroll/smooth-scroll.tmux

# --- tmux-agent-indicator (manual install, no TPM) ------------------------
# Visual feedback for AI agent state (running/needs-input/done) via pane
# border + window-title colors. Hooks are wired in ~/.claude/settings.json
# (UserPromptSubmit, PermissionRequest, Stop) — see CLAUDE.md bootstrap.
# Source: github.com/accessd/tmux-agent-indicator
# --------------------------------------------------------------------------
set -g @agent-indicator-icons 'claude=🤖,codex=🧠,default=🤖'

# gruvbox palette (defaults are bright red/yellow/green — too loud)
set -g @agent-indicator-needs-input-border 'colour214'
set -g @agent-indicator-needs-input-window-title-bg 'colour214'
set -g @agent-indicator-needs-input-window-title-fg 'colour235'
set -g @agent-indicator-done-border 'colour142'
set -g @agent-indicator-done-window-title-bg 'colour167'
set -g @agent-indicator-done-window-title-fg 'colour235'

# keep colors until you focus the pane (vs. clearing the moment hook fires)
set -g @agent-indicator-reset-on-focus 'on'

# Knight Rider animation: gimmicky, off
set -g @agent-indicator-animation-enabled 'off'

run-shell ~/.tmux/plugins/tmux-agent-indicator/agent-indicator.tmux

# --- Claude "working" spinner animator ------------------------------------
# Drives the animated @cc_spin_frame the window-status formats render (see
# "Claude working spinner" above). Single-instance (flock), self-exits when
# the server dies; re-sourcing is a no-op while it's already running.
# --------------------------------------------------------------------------
run-shell -b ~/gits/dot_files/tmux/claude-spinner.sh

# FROM PI AGENT
set -g extended-keys on
set -g extended-keys-format csi-u
