# remap prefix from 'C-b' to 'C-a'
unbind C-b
set-option -g prefix C-a
bind-key C-a send-prefix

# copy to system clipboard from tmux
bind -T copy-mode-vi y send-keys -X copy-pipe-and-cancel 'xclip -in -selection clipboard'

# Enable mouse mode (tmux 2.1 and above)
set -g mouse on

# Don't exit copy mode on mouse drag end (prevents snap-to-bottom)
unbind -T copy-mode-vi MouseDragEnd1Pane
unbind -T copy-mode MouseDragEnd1Pane

# Scroll 1 line per wheel tick for smoother feel (default is 5)
bind -T copy-mode-vi WheelUpPane send-keys -X -N 1 scroll-up
bind -T copy-mode-vi WheelDownPane send-keys -X -N 1 scroll-down
bind -T copy-mode WheelUpPane send-keys -X -N 1 scroll-up
bind -T copy-mode WheelDownPane send-keys -X -N 1 scroll-down

# improve colors
set-option -g default-terminal 'screen-256color'

# act like vim
#setw -g mode-keys vi

# start window numbers at 1 to match keyboard order with tmux window order
set -g base-index 1
set-window-option -g pane-base-index 1

# renumber windows sequentially after closing any of them
set -g renumber-windows on

# soften status bar color from harsh green to light gray
set -g status-style bg='#666666',fg='#aaaaaa'

# remove administrative debris (session name, hostname, time) in status bar
set -g status-left ''
set -g status-right ''

# show a prominent [Z] marker on the active window when its pane is zoomed
set -g window-status-current-format '#I:#W#{?window_zoomed_flag,#[fg=#fabd2f#,bold] [Z],}'
set -g window-status-format '#I:#W#{?window_zoomed_flag, [Z],}'

# increase scrollback lines
set -g history-limit 10000

# copied from github so tmux -vim compatible ist

# Smart pane switching with awareness of Vim splits.
# See: https://github.com/christoomey/vim-tmux-navigator
is_vim="ps -o state= -o comm= -t '#{pane_tty}' \
    | grep -iqE '^[^TXZ ]+ +(\\S+\\/)?g?(view|n?vim?x?)(diff)?$'"
bind-key -n 'C-h' if-shell "$is_vim" 'send-keys C-h'  'select-pane -L'
bind-key -n 'C-j' if-shell "$is_vim" 'send-keys C-j'  'select-pane -D'
bind-key -n 'C-k' if-shell "$is_vim" 'send-keys C-k'  'select-pane -U'
bind-key -n 'C-l' if-shell "$is_vim" 'send-keys C-l'  'select-pane -R'
tmux_version='$(tmux -V | sed -En "s/^tmux ([0-9]+(.[0-9]+)?).*/\1/p")'
if-shell -b '[ "$(echo "$tmux_version < 3.0" | bc)" = 1 ]' \
    "bind-key -n 'C-\\' if-shell \"$is_vim\" 'send-keys C-\\'  'select-pane -l'"
if-shell -b '[ "$(echo "$tmux_version >= 3.0" | bc)" = 1 ]' \
    "bind-key -n 'C-\\' if-shell \"$is_vim\" 'send-keys C-\\\\'  'select-pane -l'"

bind-key -T copy-mode-vi 'C-h' select-pane -L
bind-key -T copy-mode-vi 'C-j' select-pane -D
bind-key -T copy-mode-vi 'C-k' select-pane -U
bind-key -T copy-mode-vi 'C-l' select-pane -R
bind-key -T copy-mode-vi 'C-\' select-pane -l

# --- copy-mode scroll UX (2026-04-18) -------------------------------------
# Use case: scanning scrollback visually, not searching. Default tmux jumps
# 5 lines per wheel tick which feels rapid-snap rather than continuous.
# Fix: azorng/tmux-smooth-scroll (manual install at
# ~/.tmux/plugins/tmux-smooth-scroll, no TPM) rebinds wheel + Ctrl-U/D +
# PgUp/Dn in copy mode to a perl animator with easing.
#
# Tunings chosen after trying each:
#   speed  40    lower = faster. 100 (default) felt sluggish; 20 too blurry.
#   easing sine  ease-in-out feels most natural. linear is mechanical, quad
#                starts slow and ends abruptly (felt "strange").
#   normal 1     lines per wheel tick. 3 felt crumpy because each tick
#                animated a 3-line chunk — with 1 the tick-to-tick flow is
#                continuous. Keyboard Ctrl-D/U still animates half/full page.
#
# Ghostty note: inside tmux, wheel events travel as the mouse protocol
# (discrete ticks), so no terminal-side smoothing can interpolate between
# ticks. Smoothness is bounded by the wheel's hardware tick rate.
#
# j-exit-at-bottom: Ctrl-D naturally cancels copy mode when it hits the
# live buffer bottom, but `j` (cursor-down) just stops dead. The binding
# below checks scroll_position=0 AND cursor on the last row; if so, cancel,
# else cursor-down. Matches the Ctrl-D feel without affecting k/G.
# --------------------------------------------------------------------------

bind -T copy-mode-vi j if-shell -F "#{&&:#{==:#{scroll_position},0},#{==:#{copy_cursor_y},#{e|-:#{pane_height},1}}}" "send-keys -X cancel" "send-keys -X cursor-down"

set -g @smooth-scroll-speed "40"
set -g @smooth-scroll-easing "sine"
set -g @smooth-scroll-normal "1"
run-shell ~/.tmux/plugins/tmux-smooth-scroll/smooth-scroll.tmux

 # recommended from nvim
 set-option -sg escape-time 10
 set-option -g focus-events on
 set-option -sa terminal-overrides ',screen-256color:RGB'

 # allow notifications
 set -g allow-passthrough on
 set -g bell-action any
 set -g monitor-bell on


